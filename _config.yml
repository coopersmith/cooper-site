title:               Cooper Smith
description: Cooper Smith's digital garden
url: "https://coopersmith.nyc"  # Your production URL
author:
  name: Cooper Smith
  # Absolute homepage + avatar used by the OpenFeed photo feed (see
  # _plugins/photo_feed_generator.rb). avatar is REQUIRED by OpenFeed — drop a
  # square image at assets/avatar.jpg (or point this at any absolute URL).
  url: "https://coopersmith.nyc"
  avatar: /assets/avatar.jpg

# OpenFeed photo feed — https://openfeed.photo/setup/
# `ring` must stay exactly "openfeed-demo". `creator` is a PERMANENT handle:
# pick it once and never change it (it's your stable identity in the ring).
photoring:
  ring: openfeed-demo
  creator: coopersmith

# Typeface — single source of truth for the font. Drives the Google Fonts
# load (_includes/head.html), the --font-sans token (styles.scss), and the
# colophon label, so they can never drift apart.
font:
  name: Hanken Grotesk
  weights: "400;500;600;700"
  specimen: https://fonts.google.com/specimen/Hanken+Grotesk

include:             ['_pages']
exclude:             ['_includes/notes_graph.json', '_dev']
# You may need to change the base URL depending on your deploy configuration.
baseurl:             ''

# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension:  false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: true

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: false

permalink:           pretty
relative_permalinks: false

plugins:
  - jekyll-last-modified-at

sass:
  sass_dir:          _sass
  style:            :compressed

collections:
  notes:
    output: true
    permalink: /:slug
  photos:
    output: true
    permalink: /photos/:slug

defaults:
  - scope:
      path: "**/*"
    values:
      layout: "default"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"
  - scope:
      path: "_photos/**/*.md"
    values:
      layout: "photo"
  # Media notes (Books / Movies / Albums) use a richer frontmatter-driven
  # layout. Listed after the _notes rule so it takes precedence.
  - scope:
      path: "_notes/MediaDiet/**/*.md"
    values:
      layout: "media"