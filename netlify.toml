[build]
  command = "jekyll build --trace"
  publish = "_site"
  functions = "netlify/functions"

# Subdomain configuration for photos.coopersmith.nyc
# Note: You'll need to configure the subdomain in Netlify dashboard:
# 1. Go to Site settings > Domain management
# 2. Add custom domain: photos.coopersmith.nyc
# 3. Netlify will provide DNS instructions (CNAME record)

[[redirects]]
  from = "https://photos.coopersmith.nyc/*"
  to = "https://coopersmith.nyc/photos/:splat"
  status = 301
  force = true

# Serve the OpenFeed photo feed as JSON Feed (https://openfeed.photo/setup/).
[[headers]]
  for = "/photo/feed.json"
  [headers.values]
    Content-Type = "application/feed+json; charset=utf-8"
