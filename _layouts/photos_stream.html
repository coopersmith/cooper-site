---
layout: default
---

<a href="{{ site.baseurl }}/" class="photo-back-button">
  ←
</a>

<div class="photos-stream">
  <div class="photos-grid">
    {% assign sorted_photos = site.photos | sort: 'date' | reverse %}
    {% for photo in sorted_photos %}
      <div class="photo-item"
         data-date="{% if photo.date %}{{ photo.date | date: "%Y-%m-%d" }}{% endif %}"
         data-location="{% if photo.location %}{{ photo.location }}{% endif %}">
        <div class="photo-placeholder">
          <img
            data-src="{{ site.baseurl }}{{ photo.image }}"
            alt="{{ photo.title }}"
            class="photo-thumbnail"
            loading="lazy"
          >
        </div>
      </div>
    {% endfor %}
  </div>
</div>

<div id="photo-date-pill" class="photo-date-pill">
  <div id="photo-date-text" class="photo-date-text"></div>
  <div id="photo-location-text" class="photo-location-text"></div>
</div>

<script src="{{ site.baseurl }}/assets/js/photo-stream.js"></script>
