---
layout: default
---

<style>
body.photo-page-body {
  max-width: 100% !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
}
body.photo-page-body .wrapper {
  max-width: 100% !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
}
body.photo-page-body #main-content {
  max-width: 100% !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
}
.photos-stream {
  max-width: 100% !important;
  width: 100% !important;
  margin: 0 auto !important;
}
.photos-grid {
  display: flex !important;
  flex-direction: column !important;
  gap: 2rem !important;
  padding: 2rem 1.5rem !important;
  align-items: center !important;
}
.photo-item {
  width: 100% !important;
  max-width: 1200px !important;
  display: block !important;
  margin: 0 auto !important;
  padding: 0 !important;
  cursor: default !important;
}
.photo-placeholder {
  width: 100% !important;
  background: var(--color-bg-secondary) !important;
  min-height: 200px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}
.photo-thumbnail {
  width: 100% !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
  display: block !important;
  object-fit: contain !important;
  opacity: 0 !important;
  transition: opacity 0.3s ease !important;
}
.photo-thumbnail.loaded {
  opacity: 1 !important;
}
.photo-placeholder {
  width: 100% !important;
  background: var(--color-bg-secondary) !important;
  min-height: 200px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  position: relative !important;
}
.photos-header {
  display: none !important;
}
.photo-back-button {
  position: fixed !important;
  top: 2rem !important;
  left: 2rem !important;
  background: rgba(255, 255, 255, 0.7) !important;
  color: rgba(0, 0, 0, 0.9) !important;
  padding: 0.75rem 1.25rem !important;
  border-radius: 2rem !important;
  font-size: 1.1rem !important;
  font-weight: 500 !important;
  z-index: 9999 !important;
  text-decoration: none !important;
  display: block !important;
  backdrop-filter: blur(20px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
  border: 1px solid rgba(255, 255, 255, 0.3) !important;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.5) !important;
  transition: all 0.3s ease !important;
}
.photo-back-button:hover {
  background: rgba(255, 255, 255, 0.8) !important;
  transform: translateX(-2px) !important;
  text-decoration: none !important;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.6) !important;
}
@media (prefers-color-scheme: dark) {
  .photo-back-button {
    background: rgba(0, 0, 0, 0.4) !important;
    color: rgba(255, 255, 255, 0.9) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
  }
  .photo-back-button:hover {
    background: rgba(0, 0, 0, 0.5) !important;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15) !important;
  }
}
.photo-date-pill {
  position: fixed !important;
  bottom: 2rem !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  background: rgba(255, 255, 255, 0.7) !important;
  color: rgba(0, 0, 0, 0.9) !important;
  padding: 0.75rem 1.5rem !important;
  border-radius: 2rem !important;
  font-size: 0.9rem !important;
  font-weight: 500 !important;
  z-index: 9999 !important;
  opacity: 1 !important;
  transition: opacity 0.3s ease !important;
  pointer-events: none !important;
  backdrop-filter: blur(20px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
  display: block !important;
  visibility: visible !important;
  text-align: center !important;
  border: 1px solid rgba(255, 255, 255, 0.3) !important;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.5) !important;
}
@media (prefers-color-scheme: dark) {
  .photo-date-pill {
    background: rgba(0, 0, 0, 0.4) !important;
    color: rgba(255, 255, 255, 0.9) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
  }
}
.photo-date-text {
  display: block !important;
  font-size: 0.9rem !important;
  font-weight: 500 !important;
  line-height: 1.4 !important;
}
.photo-location-text {
  display: block !important;
  font-size: 0.75rem !important;
  font-weight: 400 !important;
  opacity: 0.8 !important;
  margin-top: 0.25rem !important;
  line-height: 1.3 !important;
}
@media (prefers-color-scheme: dark) {
  .photo-date-pill {
    background: rgba(255, 255, 255, 0.15) !important;
  }
}
</style>

<a href="{{ site.baseurl }}/" class="photo-back-button">
  ←
</a>

<div class="photos-stream">
  <header class="photos-header">
    <h1>Photos</h1>
  </header>

  <div class="photos-grid">
    {% assign sorted_photos = site.photos | sort: 'date' | reverse %}
    {% for photo in sorted_photos %}
      <div class="photo-item" 
         data-date="{% if photo.date %}{{ photo.date | date: "%Y-%m-%d" }}{% endif %}"
         data-location="{% if photo.location %}{{ photo.location }}{% endif %}">
        <div class="photo-placeholder">
          <img 
            data-src="{{ site.baseurl }}{{ photo.image }}" 
            alt="{{ photo.title }}"
            class="photo-thumbnail"
            loading="lazy"
          >
        </div>
        {% comment %}
        <div class="photo-overlay">
          {% if photo.date %}
            <span class="photo-date-label">{{ photo.date | date: "%b %-d, %Y" }}</span>
          {% endif %}
        </div>
        {% endcomment %}
      </div>
    {% endfor %}
  </div>
</div>

<div id="photo-date-pill" class="photo-date-pill" style="opacity: 1 !important; display: block !important;">
  <div id="photo-date-text" class="photo-date-text"></div>
  <div id="photo-location-text" class="photo-location-text"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Progressive image loading
  const images = document.querySelectorAll('.photo-thumbnail[data-src]');
  
  const imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        const src = img.getAttribute('data-src');
        
        if (src) {
          // Create new image to preload
          const newImg = new Image();
          newImg.onload = function() {
            img.src = src;
            img.removeAttribute('data-src');
            img.classList.add('loaded');
          };
          newImg.onerror = function() {
            img.classList.add('loaded'); // Still show placeholder on error
          };
          newImg.src = src;
        }
        
        observer.unobserve(img);
      }
    });
  }, {
    rootMargin: '300px' // Start loading 300px before image enters viewport (about 2-3 screen heights)
  });
  
  images.forEach(img => imageObserver.observe(img));
  
  // Date pill functionality
  const photos = document.querySelectorAll('.photo-item');
  const datePill = document.getElementById('photo-date-pill');
  const dateText = document.getElementById('photo-date-text');
  const locationText = document.getElementById('photo-location-text');
  
  if (!photos.length || !datePill || !dateText) {
    console.error('Missing elements:', { 
      photos: photos.length, 
      datePill: !!datePill, 
      dateText: !!dateText 
    });
    return;
  }
  
  // Format location: "City, Country" but hide country if "United States"
  const formatLocation = (location) => {
    if (!location) return null;
    
    // Split by comma
    const parts = location.split(',').map(s => s.trim());
    
    if (parts.length >= 2) {
      const city = parts[0];
      const country = parts.slice(1).join(', '); // Handle multiple parts
      
      // Hide country if it's United States
      if (country.toLowerCase().includes('united states') || 
          country.toLowerCase() === 'usa' ||
          country.toLowerCase() === 'us') {
        return city;
      }
      
      return `${city}, ${country}`;
    }
    
    return location;
  };
  
  // Extract dates and locations from photo data attributes
  const photoData = Array.from(photos).map(photo => {
    return {
      date: photo.getAttribute('data-date') || null,
      location: formatLocation(photo.getAttribute('data-location'))
    };
  });
  
  console.log('Found', photoData.length, 'photos:', photoData);
  
  let currentData = { date: null, location: null };
  
  const updatePill = (data) => {
    if (data.date && (data.date !== currentData.date || data.location !== currentData.location)) {
      console.log('Updating pill:', data);
      currentData = data;
      datePill.style.opacity = '0';
      setTimeout(() => {
        dateText.textContent = data.date;
        if (locationText) {
          if (data.location) {
            locationText.textContent = data.location;
            locationText.style.display = 'block';
          } else {
            locationText.textContent = '';
            locationText.style.display = 'none';
          }
        }
        datePill.style.opacity = '1';
        datePill.style.display = 'block';
        datePill.style.visibility = 'visible';
      }, 150);
    }
  };
  
  // Set up Intersection Observer
  const observerOptions = {
    root: null,
    rootMargin: '-45% 0px -45% 0px',
    threshold: [0, 0.1, 0.5, 1]
  };
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const index = Array.from(photos).indexOf(entry.target);
        const data = photoData[index];
        if (data && data.date) {
          updatePill(data);
        }
      }
    });
  }, observerOptions);
  
  // Observe all photos
  photos.forEach(photo => observer.observe(photo));
  
  // Show date for first photo on load
  if (photoData[0] && photoData[0].date) {
    console.log('Setting initial data:', photoData[0]);
    updatePill(photoData[0]);
  } else {
    console.log('No photo data found');
  }
});
</script>
