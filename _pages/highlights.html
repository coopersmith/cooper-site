<h1>Commonplace</h1>
<p class="subtitle">Passages I've marked while reading, newest first.</p>

<div id="highlights"></div>
<div id="load-more-container" style="text-align: center; margin-top: 2em;">
  <button id="load-more-btn" style="display: none;">Load More Highlights</button>
</div>

<script>
// Highlights are baked into static, paginated JSON at build time
// (_plugins/readwise_highlights_page.rb), so there are no runtime API calls —
// each "page" is just the next file on the CDN.
let nextPageUrl = null;
let isLoading = false;

// Readwise highlight text arrives as Markdown (bold, italic, links). Render a
// safe subset to HTML: escape everything first, then re-introduce only the
// tags we generate ourselves.
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMarkdown(text) {
  if (!text) return '';
  // Split on blank lines into paragraphs; single newlines become <br>.
  return escapeHtml(text)
    .split(/\n{2,}/)
    .map(block => {
      const html = block
        // [label](http(s)://url) → anchor (only http/https to avoid js: URIs)
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
                 '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
        // **bold** (before single-* italic)
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        // *italic*
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
      return `<p>${html}</p>`;
    })
    .join('');
}

function renderAttribution(h) {
  if (!h.attribution) return '';
  const label = escapeHtml(h.attribution);
  const inner = h.url
    ? `<a href="${escapeHtml(h.url)}" target="_blank" rel="noopener noreferrer">${label}</a>`
    : label;
  return `<cite>— ${inner}</cite>`;
}

async function loadHighlights(pageUrl = null, append = false) {
  const container = document.getElementById('highlights');
  const loadMoreBtn = document.getElementById('load-more-btn');

  if (isLoading) return;
  isLoading = true;

  if (!append) {
    container.innerHTML = '';
    loadMoreBtn.style.display = 'none';
  }

  try {
    const url = pageUrl || '/assets/highlights/page-1.json';
    const response = await fetch(url);
    if (!response.ok) {
      if (!append) container.textContent = `Error loading highlights: ${response.status}`;
      return;
    }

    const data = await response.json();
    const highlights = data.highlights || [];
    nextPageUrl = data.nextPageUrl;

    if (!Array.isArray(highlights) || highlights.length === 0) {
      if (!append) container.textContent = 'No highlights found.';
      return;
    }

    highlights.forEach(h => {
      const item = document.createElement('div');
      item.className = 'book-highlight';
      item.innerHTML = `
        <blockquote>
          ${renderMarkdown(h.text)}
          ${renderAttribution(h)}
        </blockquote>
      `;
      container.appendChild(item);
    });

    loadMoreBtn.style.display = nextPageUrl ? 'inline-block' : 'none';
  } catch (error) {
    console.error('Failed to load highlights:', error);
    if (!append) container.textContent = 'Failed to load highlights.';
  } finally {
    isLoading = false;
  }
}

document.getElementById('load-more-btn').addEventListener('click', () => {
  if (nextPageUrl && !isLoading) {
    const btn = document.getElementById('load-more-btn');
    btn.textContent = 'Loading...';
    btn.disabled = true;

    loadHighlights(nextPageUrl, true).finally(() => {
      btn.textContent = 'Load More Highlights';
      btn.disabled = false;
    });
  }
});

// Initial load
loadHighlights();
</script>
