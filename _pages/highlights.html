<h1>Commonplace</h1>
<p class="subtitle">Passages I've marked while reading, newest first.</p>

<div id="highlights-filter" class="highlights-filter" role="group" aria-label="Filter highlights by tag"></div>

<div id="highlights"></div>

<p id="highlights-status" class="highlights-status" aria-live="polite"></p>
<div id="scroll-sentinel" aria-hidden="true"></div>

<script>
// Highlights are baked into static, paginated JSON at build time
// (_plugins/readwise_highlights_page.rb): a default "all" stream plus one
// stream per featured tag, described by index.json. So there are no runtime API
// calls — filtering just loads a different set of static files, and scrolling
// pages the current stream in via an IntersectionObserver.
const container = document.getElementById('highlights');
const filterBar = document.getElementById('highlights-filter');
const statusEl = document.getElementById('highlights-status');
const sentinel = document.getElementById('scroll-sentinel');

let tags = [];        // featured chips: [{name, slug, count, url}]
let allTags = {};     // every linkable tag: { slug: name }
let allUrl = '/assets/highlights/all/page-1.json';
let currentSlug = null; // null = "All"
let nextPageUrl = null;
let isLoading = false;

// --- Markdown (safe subset) ------------------------------------------------
// Readwise highlight text arrives as Markdown. Escape everything first, then
// re-introduce only the tags we generate ourselves.
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMarkdown(text) {
  if (!text) return '';
  return escapeHtml(text)
    .split(/\n{2,}/)
    .map(block => {
      const html = block
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
                 '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
      return `<p>${html}</p>`;
    })
    .join('');
}

function renderAttribution(h) {
  if (!h.attribution) return '';
  const label = escapeHtml(h.attribution);
  const inner = h.url
    ? `<a href="${escapeHtml(h.url)}" target="_blank" rel="noopener noreferrer">${label}</a>`
    : label;
  return `<cite>— ${inner}</cite>`;
}

function appendHighlight(h) {
  const item = document.createElement('div');
  item.className = 'book-highlight';
  item.innerHTML = `<blockquote>${renderMarkdown(h.text)}${renderAttribution(h)}</blockquote>`;
  container.appendChild(item);
}

// --- Filter bar ------------------------------------------------------------
function renderChips() {
  filterBar.innerHTML = '';
  filterBar.appendChild(makeChip('All', null));
  const featuredSlugs = new Set(tags.map(t => t.slug));
  tags.forEach(t => filterBar.appendChild(makeChip(t.name, t.slug, t.count)));
  // A deep-linked tag that isn't one of the featured chips still gets a chip,
  // so the active filter is visible and clearable.
  if (currentSlug && !featuredSlugs.has(currentSlug)) {
    filterBar.appendChild(makeChip(allTags[currentSlug] || currentSlug, currentSlug));
  }
  updateActiveChip();
}

function makeChip(label, slug, count) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'tag';
  btn.dataset.slug = slug === null ? '' : slug;
  btn.textContent = label;
  if (count != null) {
    const c = document.createElement('span');
    c.className = 'tag-count';
    c.textContent = count;
    btn.appendChild(document.createTextNode(' '));
    btn.appendChild(c);
  }
  btn.addEventListener('click', () => selectTag(slug));
  return btn;
}

function updateActiveChip() {
  const active = currentSlug || '';
  filterBar.querySelectorAll('button.tag').forEach(btn => {
    const on = btn.dataset.slug === active;
    btn.classList.toggle('is-active', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
}

function firstPageUrlFor(slug) {
  if (!slug) return allUrl;
  const featured = tags.find(t => t.slug === slug);
  return featured ? featured.url : `/assets/highlights/tag/${slug}/page-1.json`;
}

function selectTag(slug) {
  if (slug === currentSlug) return;
  currentSlug = slug || null;
  location.hash = currentSlug ? currentSlug : '';
  startStream();
}

// --- Streaming (load + infinite scroll) ------------------------------------
function startStream() {
  container.innerHTML = '';
  nextPageUrl = firstPageUrlFor(currentSlug);
  isLoading = false;
  renderChips();
  loadNext();
}

async function loadNext() {
  if (isLoading || !nextPageUrl) return;
  const url = nextPageUrl;
  isLoading = true;
  setStatus('Loading…');

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    nextPageUrl = data.nextPageUrl || null;
    (data.highlights || []).forEach(appendHighlight);
    setStatus(container.children.length === 0 ? 'No highlights found.' : '');
  } catch (err) {
    console.error('Failed to load highlights:', err);
    nextPageUrl = null;
    if (container.children.length === 0) setStatus('Failed to load highlights.');
  } finally {
    isLoading = false;
  }

  // Keep filling while the sentinel is still within reach (short pages / tall
  // viewports) and there's more to load.
  if (nextPageUrl && sentinelNear()) loadNext();
}

function sentinelNear() {
  const rect = sentinel.getBoundingClientRect();
  return rect.top <= window.innerHeight + 800;
}

function setStatus(text) {
  statusEl.textContent = text;
}

// Auto-load the next page ~800px before the sentinel scrolls into view.
if ('IntersectionObserver' in window) {
  const io = new IntersectionObserver(entries => {
    if (entries.some(e => e.isIntersecting)) loadNext();
  }, { rootMargin: '800px 0px' });
  io.observe(sentinel);
} else {
  // Fallback for the rare browser without IntersectionObserver.
  window.addEventListener('scroll', () => { if (sentinelNear()) loadNext(); }, { passive: true });
}

// Reflect the URL hash (e.g. /highlights#design) so filtered views are shareable
// and the back button works. Any real tag resolves — not just the featured
// chips — as long as its slug matches a baked stream. Must mirror the plugin's
// slugify so "#Watches" and "#anthropic/claude" land on the right stream.
function slugify(raw) {
  return raw.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function slugFromHash() {
  const raw = decodeURIComponent(location.hash.replace(/^#/, '')).trim();
  if (!raw || raw === 'all') return null;
  const slug = slugify(raw);
  return allTags[slug] ? slug : null; // unknown tag → fall back to All
}

window.addEventListener('hashchange', () => {
  const slug = slugFromHash();
  if (slug !== currentSlug) {
    currentSlug = slug;
    startStream();
  }
});

// --- Boot ------------------------------------------------------------------
(async function init() {
  try {
    const res = await fetch('/assets/highlights/index.json');
    if (res.ok) {
      const index = await res.json();
      tags = Array.isArray(index.tags) ? index.tags : [];
      allTags = index.allTags || {};
      allUrl = index.allUrl || allUrl;
    }
  } catch (err) {
    console.error('Failed to load highlights index:', err);
  }
  currentSlug = slugFromHash();
  startStream();
})();
</script>
